<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宇萌新人教育訓練 - 普拉太空冒險版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #05060a;
            --space-blue: #0b1426;
            --ui-border: #1a1a3a;
            --ui-shadow: #3a3a6a;
            --energy-green: #39FF14;
            --tech-blue: #00D4FF;
            --card-bg-active: #111827;
            --card-bg-cleared: #334155;
            --neon-pink: #ff00ff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--space-dark);
            overflow-x: hidden; 
            margin: 0; 
            padding-bottom: 50px; 
            color: white;
        }

        /* --- 8-bit 像素與科技風格 UI --- */
        .pixel-border { 
            border: 4px solid var(--ui-border); 
            box-shadow: 4px 4px 0px 0px var(--ui-shadow); 
        }
        .neon-text { text-shadow: 0 0 10px var(--tech-blue), 0 0 20px var(--tech-blue); }
        .pixel-btn:active { transform: translateY(2px); box-shadow: 2px 2px 0px 0px var(--ui-shadow); }

        /* --- 動畫特效 --- */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        @keyframes starPop {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            50% { transform: translateY(-120px) scale(1.8) rotate(180deg); opacity: 1; }
            100% { transform: translateY(-180px) scale(1) rotate(360deg); opacity: 0; }
        }
        @keyframes starMove { from { transform: translateY(0); } to { transform: translateY(-1000px); } }
        @keyframes typing { from { width: 0 } to { width: 100% } }

        .animate-float { animation: float 3s infinite ease-in-out; }
        .star-animation { position: absolute; pointer-events: none; animation: starPop 0.8s ease-out forwards; z-index: 100; }
        
        /* 背景星空層 */
        .bg-stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 200%;
            background: transparent; z-index: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff, transparent),
                radial-gradient(1px 1px at 20% 50%, #fff, transparent),
                radial-gradient(2px 2px at 40% 80%, #fff, transparent),
                radial-gradient(1px 1px at 60% 20%, #fff, transparent),
                radial-gradient(2px 2px at 80% 40%, #fff, transparent),
                radial-gradient(1px 1px at 90% 70%, #fff, transparent);
            background-size: 500px 500px;
            animation: starMove 120s linear infinite;
        }

        .card-active { background-color: var(--card-bg-active); border: 3px solid var(--tech-blue); }
        .card-active:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); border-color: white; transform: translateY(-5px); }
        .card-cleared { background-color: var(--card-bg-cleared); opacity: 0.6; border: 3px solid #475569; }
        
        .sidebar-bg { background-color: rgba(13, 14, 23, 0.95); backdrop-filter: blur(10px); }
        .mission-window { background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); }

        /* 聊天室專用樣式 */
        #chat-window {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: bottom right;
        }
        .message-bubble { position: relative; max-width: 85%; padding: 10px 15px; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        .pula-msg { background: var(--space-blue); border: 2px solid var(--tech-blue); color: white; border-radius: 15px 15px 15px 0; align-self: flex-start; }
        .user-msg { background: var(--energy-green); border: 2px solid black; color: black; border-radius: 15px 15px 0 15px; align-self: flex-end; }

        @media (max-width: 768px) { .sidebar { position: static; width: 100%; border-right: none; border-bottom: 4px solid var(--ui-border); } }
        
        select { appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white"><path d="M5 8l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--tech-blue); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-stars"></div>

    <div class="h-6 bg-slate-900 w-full sticky top-0 z-50 border-b-4 border-indigo-900/50 flex items-center px-4 overflow-hidden text-white">
        <div class="flex gap-2">
            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
            <div class="w-2 h-2 rounded-full bg-green-500"></div>
        </div>
        <div class="mx-auto text-[8px] font-black tracking-[1em] text-indigo-400 uppercase opacity-50">Cosmic Terminal Interface v3.5</div>
    </div>

    <div class="max-w-[1440px] mx-auto flex flex-col md:flex-row min-h-screen relative z-10 mt-6 px-4">
        <!-- 側邊欄 -->
        <aside class="md:w-80 sidebar-bg pixel-border p-6 flex flex-col sidebar mr-6 text-white h-fit sticky top-12">
            <div class="text-center border-b-4 border-indigo-900/50 pb-6 mb-8">
                <div class="inline-block p-2 mb-2 animate-float">
                    <img src="普拉-002.png" alt="普拉" class="w-24 h-24 object-contain drop-shadow-[0_0_15px_rgba(0,212,255,0.6)]">
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none neon-text">AR PLANET</h1>
                <p class="text-[11px] font-bold bg-white text-black px-2 py-0.5 inline-block mt-2 uppercase pixel-border border-2">Mission Portal</p>
            </div>
            
            <div id="nav-levels" class="space-y-4"></div>
            
            <div class="mt-10 p-4 pixel-border bg-slate-900/80 border-indigo-500/30">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2 font-black text-sm">
                        <span class="text-yellow-400 animate-pulse">★</span>
                        <span id="cleared-count" class="text-yellow-400 font-mono tracking-widest">x00</span>
                    </div>
                    <span class="text-xs font-black italic text-[var(--tech-blue)]" id="progress-percent">0%</span>
                </div>
                <div class="w-full h-8 bg-black p-1.5 pixel-border border-2 border-slate-700 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-[var(--energy-green)] transition-all duration-700 relative shadow-[0_0_15px_rgba(57,255,20,0.5)]" style="width: 0%">
                        <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                    </div>
                </div>
                <p class="text-[9px] text-center mt-2 text-[var(--tech-blue)] font-bold uppercase tracking-widest">Core Power Stability</p>
            </div>
        </aside>

        <!-- 主內容 -->
        <main class="flex-grow">
            <div class="flex flex-col xl:flex-row gap-6 mb-10 items-stretch">
                <!-- 個人證 -->
                <div id="profile-card" class="cursor-pointer group flex-shrink-0">
                    <div class="flex items-stretch pixel-border bg-slate-800/80 hover:bg-slate-700/80 transition-all border-indigo-500/30 min-h-[110px]">
                        <div class="bg-indigo-900/50 p-4 flex items-center border-r-4 border-indigo-900/50 text-[var(--tech-blue)]">
                            <svg class="w-10 h-10 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H9a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="px-6 py-2 flex flex-col justify-center min-w-[220px]" id="display-info">
                            <p id="player-dept-display" class="text-[11px] font-black text-indigo-400 uppercase leading-none mb-1 text-left">TECHNICAL</p>
                            <p id="player-name-display" class="text-3xl font-black italic tracking-tighter uppercase leading-tight text-white">PLAYER 1</p>
                        </div>
                        <div class="hidden p-4 flex flex-col gap-3 min-w-[260px] bg-slate-900" id="edit-info">
                            <input id="input-name" class="w-full border-2 border-indigo-500/50 p-2 text-sm font-bold uppercase bg-black text-white focus:border-[var(--tech-blue)] outline-none" placeholder="輸入姓名">
                            <select id="input-dept" class="w-full border-2 border-indigo-500/50 p-2 text-sm font-bold uppercase bg-black text-white focus:border-[var(--tech-blue)] outline-none">
                                <option value="Technical">Technical</option>
                                <option value="Creative">Creative</option>
                                <option value="Operations">Operations</option>
                                <option value="Management">Management</option>
                                <option value="XRA">XRA</option>
                            </select>
                            <button id="save-btn" class="w-full bg-[var(--energy-green)] text-black py-2 font-black text-xs hover:bg-white transition-colors">UPLOAD DATA</button>
                        </div>
                    </div>
                </div>

                <!-- 任務說明視窗 -->
                <div class="flex-grow mission-window pixel-border p-6 border-l-8 border-l-[var(--tech-blue)] flex items-start gap-5 shadow-[0_0_15px_rgba(0,212,255,0.1)]">
                    <div class="w-12 h-12 flex-shrink-0 bg-black/40 pixel-border border-2 flex items-center justify-center text-[var(--tech-blue)] font-black text-2xl animate-pulse">!</div>
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="w-2 h-2 bg-[var(--tech-blue)] rounded-full"></span>
                            <p class="text-[var(--tech-blue)] font-black text-xs uppercase tracking-widest">Incoming Message</p>
                        </div>
                        <p class="text-white font-black text-lg leading-relaxed">點擊左側星星收集能量星辰，完成所有新人太空任務！</p>
                        <div class="mt-2 flex items-center gap-4">
                            <span class="text-yellow-400 font-bold text-sm bg-yellow-400/10 px-2 py-1 pixel-border border">※ 請使用公司信箱登錄 ※</span>
                            <div class="text-[var(--tech-blue)] flex items-center gap-2">
                                <span class="text-[10px] opacity-60">WIFI:</span>
                                <span class="text-xs font-black tracking-tighter">AR3F-5G / ar-planet2915</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 任務卡片區 -->
            <div id="content-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-8 pb-12"></div>
        </main>
    </div>

    <!-- 底部裝飾 -->
    <div class="fixed bottom-0 left-0 w-full h-16 bg-slate-900 border-t-4 border-indigo-900/50 z-20 overflow-hidden flex items-end">
        <div class="w-full h-6 bg-black/40 flex">
            <div class="flex-grow border-r-2 border-indigo-900/20"></div>
            <div class="flex-grow border-r-2 border-indigo-900/20"></div>
            <div class="flex-grow border-r-2 border-indigo-900/20"></div>
            <div class="flex-grow border-r-2 border-indigo-900/20"></div>
        </div>
    </div>

    <!-- AI 聊天室懸浮按鈕 -->
    <div class="fixed bottom-20 right-6 z-[100]">
        <button onclick="toggleChat()" class="group relative flex items-center justify-center p-2">
            <div class="absolute inset-0 bg-[var(--tech-blue)] rounded-full blur-md opacity-40 group-hover:opacity-100 transition-opacity"></div>
            <img src="普拉-002.png" alt="AI Pula" class="w-16 h-16 object-contain relative animate-float pixel-img drop-shadow-[0_0_10px_white]">
            <div class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-white animate-bounce">AI</div>
        </button>

        <!-- 聊天視窗 -->
        <div id="chat-window" class="hidden absolute bottom-20 right-0 w-[350px] max-h-[500px] pixel-border sidebar-bg flex flex-col shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden">
            <div class="bg-indigo-900/80 p-4 border-b-4 border-indigo-900 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span class="font-black text-sm tracking-tighter uppercase">Pula Assistant Online</span>
                </div>
                <button onclick="toggleChat()" class="text-white hover:text-red-500 font-black">✕</button>
            </div>
            
            <div id="chat-messages" class="flex-grow overflow-y-auto p-4 flex flex-col min-h-[300px] max-h-[350px] space-y-4">
                <div class="message-bubble pula-msg">宇宙探險員您好！我是普拉 AI，有什麼教育訓練相關的問題想問我嗎？</div>
            </div>

            <div id="chat-loading" class="hidden px-4 py-2 text-[10px] italic text-[var(--tech-blue)] animate-pulse">普拉正在連線銀河腦庫中...</div>

            <div class="p-4 bg-black/40 border-t-4 border-indigo-900/50 flex gap-2">
                <input id="chat-input" type="text" placeholder="請輸入問題..." class="flex-grow bg-slate-800 border-2 border-indigo-500/30 p-2 text-xs font-bold text-white outline-none focus:border-[var(--tech-blue)]">
                <button onclick="sendChatMessage()" class="bg-[var(--tech-blue)] text-black px-4 py-2 font-black text-xs pixel-border border-2">SEND</button>
            </div>
        </div>
    </div>

    <!-- 過關特效 -->
    <div id="clear-overlay" class="fixed inset-0 z-[110] flex flex-col items-center justify-center bg-black/90 backdrop-blur-md hidden">
        <div class="p-12 pixel-border bg-slate-900 text-center transform -rotate-1 relative overflow-hidden border-indigo-500 shadow-[0_0_50px_var(--tech-blue)]">
            <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/10 to-transparent animate-pulse"></div>
            <img src="普拉-002.png" alt="普拉" class="w-36 h-36 mx-auto mb-6 animate-float relative z-10">
            <h2 class="text-6xl font-black text-white italic mb-4 neon-text relative z-10">MISSION CLEAR!</h2>
            <p id="congrats-text" class="text-yellow-400 font-bold text-2xl uppercase mb-8 relative z-10 tracking-[0.2em]"></p>
            <button onclick="resetTraining()" class="px-8 py-3 bg-[var(--tech-blue)] text-black font-black text-lg pixel-border hover:bg-white transition-all relative z-10">SYSTEM REBOOT</button>
        </div>
    </div>

    <script>
        const levels = [
            { id: 'level1', label: 'WORLD 1-1', sub: '認識宇萌', icon: '🚀' },
            { id: 'level2', label: 'WORLD 1-2', sub: '產品與素材', icon: '📦' },
            { id: 'level3', label: 'WORLD 1-3', sub: 'XR 知識庫', icon: '🌌' },
            { id: 'level4', label: 'WORLD 1-4', sub: '行政與表單', icon: '📑' },
            { id: 'level5', label: 'BONUS', sub: '精選分享會', icon: '🎬' }
        ];

        const trainingData = {
            level1: [
                { id: 's1', name: '官網精選案例', url: 'https://www.arplanet.com.tw/case-situation/', type: 'WEB', memo: '認識公司官網案例' },
                { id: 's2', name: '公司 Youtube 頻道', url: 'https://www.youtube.com/user/arplanet2', type: 'VIDEO', memo: '追蹤與訂閱' },
                { id: 's3', name: 'FB (下一秒製造所)', url: 'https://www.facebook.com/arplanet.tw/', type: 'SOCIAL', memo: '按讚掌握動態' },
                { id: 's4', name: 'IG (下一秒製造所)', url: 'https://www.instagram.com/arplanet.tw', type: 'SOCIAL', memo: '追蹤掌握視覺' },
                { id: 's5', name: 'Mew_IG', url: 'https://www.instagram.com/mew_reality/', type: 'SOCIAL', memo: 'Metaverse Life' },
                { id: 's6', name: '普拉_IG', url: 'https://www.instagram.com/xr_pula_daily/', type: 'SOCIAL', memo: 'Pula Daily' }
            ],
            level2: [
                { id: 'w1', name: 'Winkiss 產品介紹簡報', url: 'https://docs.google.com/presentation/d/1KBeDulhzx6rJR-VmOA7E2OtreP6dCQul/edit', type: 'PPT', memo: '34頁核心功能' },
                { id: 'w2', name: 'Winkiss 介紹影片', url: 'https://youtu.be/gtaod70-6rM', type: 'VIDEO', memo: '21分鐘精華' },
                { id: 'w3', name: 'Winkiss 後台教學', url: 'https://youtu.be/qDITk1-dIUM', type: 'VIDEO', memo: '後台操作實錄' },
                { id: 'w4', name: 'marq+ 基本介紹', url: 'https://drive.google.com/drive/folders/1F1Z5eCBnM-Xn2R8q4-kNllmsqy20VR2c', type: 'PPT', memo: '61頁完整指南' },
                { id: 'w5', name: 'marq+ 素材規格說明', url: 'https://docs.google.com/presentation/d/1cgwjml_kberYXGB9P13WnAiTH4zeYm2/edit', type: 'PPT', memo: '設計規格對接' },
                { id: 'w6', name: '組合模組教學影片', url: 'https://youtu.be/z04Cin-GmRzA', type: 'VIDEO', memo: '65分鐘詳細教學' }
            ],
            level3: [
                { id: 'x1', name: 'XR 基礎概論', url: 'https://docs.google.com/presentation/d/10ZHNwKBMwFfvRd-Nyolz9C-NEe6Eo18k/edit', type: 'PPT', memo: '產業必備知識' },
                { id: 'x2', name: 'AR 擴增實境創意案例', url: 'https://docs.google.com/presentation/d/1jOTWDAadgB3Bbr8oDue-Isy4BJUPi6S44zzWvIhXciA/edit', type: 'PPT', memo: '設計思維引導' },
                { id: 'x3', name: 'VR 體感學習簡報', url: 'https://docs.google.com/presentation/d/110zTOF70xm9oQKCxwiHZw_rxzP1IzEtO/edit', type: 'PPT', memo: '大螢幕互動應用' },
                { id: 'x4', name: '官網 AR 風向文', url: 'https://www.arplanet.com.tw/trends', type: 'WEB', memo: 'SEO與趨勢觀測' }
            ],
            level4: [
                { id: 'a1', name: '人事出勤系統 (Mavo)', url: 'https://hrm.mavohr.com/tube', type: 'LINK', memo: '打卡與請假管理' },
                { id: 'a2', name: '同事介紹/座位表', url: 'https://docs.google.com/spreadsheets/d/1tMFIG21Pa0Wwel7e4bdYnmOxrZyFmVkmu7vr5iXsWs/edit', type: 'SHEET', memo: '認識大家' },
                { id: 'a3', name: '會議室租用系統', url: 'http://bmr.isi999.com.tw/', type: 'LINK', memo: '預約平台' },
                { id: 'a4', name: '設計部製作時間表', url: 'https://docs.google.com/spreadsheets/d/1YyudKr1RWwz2HPtPfIXox11-rd5p52TW6R6aC0aAHBI/edit', type: 'SHEET', memo: '需求排程' }
            ],
            level5: [
                { id: 'v1', name: 'WebAR 技術解析', url: 'https://youtu.be/cPTurF6GFF4', speaker: '莉婷', memo: '技術分享' },
                { id: 'v2', name: 'AI 工作術分享', url: 'https://youtu.be/r2cCgLyFODE', speaker: 'Coco', memo: '營運效率' },
                { id: 'v3', name: 'Stable Diffusion 工作坊', url: 'https://youtu.be/HlifvsjcZLk', speaker: 'Haoming', memo: '生成式AI' }
            ]
        };

        let state = {
            activeTab: 'level1',
            playerName: localStorage.getItem('arp_name') || 'PLAYER 1',
            playerDept: localStorage.getItem('arp_dept') || 'TECHNICAL',
            completedTasks: JSON.parse(localStorage.getItem('arp_tasks')) || []
        };

        const totalTasksCount = Object.values(trainingData).flat().length;

        function render() {
            const navEl = document.getElementById('nav-levels');
            navEl.innerHTML = levels.map(lv => `
                <button onclick="setActiveTab('${lv.id}')" class="w-full pixel-btn pixel-border p-5 flex items-center gap-4 transition-all duration-300 ${state.activeTab === lv.id ? 'bg-[var(--tech-blue)] text-black shadow-[0_0_20px_var(--tech-blue)]' : 'bg-slate-800/80 text-white hover:bg-slate-700'}">
                    <div class="text-3xl">${lv.icon}</div>
                    <div class="font-black text-left flex-grow">
                        <p class="text-lg md:text-xl font-black uppercase tracking-tighter ${state.activeTab === lv.id ? 'text-black' : 'text-[var(--tech-blue)]'}">${lv.sub}</p>
                        <p class="text-[10px] opacity-60 font-mono">${lv.label}</p>
                    </div>
                    ${state.activeTab === lv.id ? '<span class="animate-bounce-x text-black text-xl">▶</span>' : ''}
                </button>
            `).join('');

            const gridEl = document.getElementById('content-grid');
            gridEl.innerHTML = trainingData[state.activeTab].map(item => {
                const isDone = state.completedTasks.includes(item.id);
                let typeIcon = '📄';
                if (item.type === 'VIDEO') typeIcon = '📽️';
                if (item.type === 'SOCIAL') typeIcon = '💬';

                const starIcon = isDone 
                    ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7 text-yellow-400 drop-shadow-[0_0_8px_gold]"><path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" /></svg>`
                    : `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-7 h-7 opacity-30 text-yellow-200"><path d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" /></svg>`;

                return `
                    <div class="pixel-border p-6 flex flex-col justify-between min-h-[11rem] relative ${isDone ? 'card-cleared' : 'card-active'} transition-all group">
                        <div class="flex gap-5 relative z-10">
                            <button onclick="toggleTask('${item.id}', event)" class="w-14 h-14 bg-slate-900 pixel-border border-2 flex items-center justify-center transition-all active:scale-90 hover:scale-110 shadow-lg">
                                ${starIcon}
                            </button>
                            <div>
                                <h3 class="font-black text-lg leading-tight group-hover:text-[var(--tech-blue)] transition-colors">${item.name}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="bg-indigo-900/50 text-[var(--tech-blue)] text-[9px] px-2 py-0.5 font-black uppercase pixel-border border-2 border-indigo-500/30">${item.type || item.speaker}</span>
                                    <span class="text-xs font-bold opacity-70">${typeIcon} ${item.memo}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex justify-end mt-4 relative z-10">
                            <a href="${item.url}" target="_blank" class="bg-[var(--energy-green)] text-black px-6 py-2 pixel-border font-black text-xs pixel-btn uppercase tracking-widest hover:bg-white transition-all">Engage Link</a>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('player-name-display').innerText = state.playerName;
            document.getElementById('player-dept-display').innerText = state.playerDept;
            document.getElementById('cleared-count').innerText = `x${state.completedTasks.length.toString().padStart(2, '0')}`;
            
            const percent = Math.round((state.completedTasks.length / totalTasksCount) * 100);
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            if (percent === 100) {
                document.getElementById('clear-overlay').classList.remove('hidden');
                document.getElementById('congrats-text').innerText = `[${state.playerDept}] ${state.playerName} 已成功征服宇宙！`;
            } else {
                document.getElementById('clear-overlay').classList.add('hidden');
            }
        }

        // --- AI 聊天室邏輯 ---
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.classList.toggle('hidden');
            if (!win.classList.contains('hidden')) {
                document.getElementById('chat-input').focus();
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const loading = document.getElementById('chat-loading');
            const question = input.value.trim();

            if (!question) return;

            // 新增使用者訊息
            messages.innerHTML += `<div class="message-bubble user-msg">${question}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // 顯示讀取中
            loading.classList.remove('hidden');

            try {
                const response = await fetch('https://chatbot-azure-chi-80.vercel.app/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                
                // 新增普拉訊息
                messages.innerHTML += `<div class="message-bubble pula-msg">${data.answer}</div>`;
            } catch (error) {
                messages.innerHTML += `<div class="message-bubble pula-msg" style="border-color:red; color:red;">通訊中斷：普拉暫時無法連線。</div>`;
            } finally {
                loading.classList.add('hidden');
                messages.scrollTop = messages.scrollHeight;
            }
        }

        // 支援 Enter 鍵送出
        document.getElementById('chat-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // 原有邏輯
        window.setActiveTab = (id) => { state.activeTab = id; render(); };
        window.toggleTask = (id, event) => {
            if (!state.completedTasks.includes(id)) {
                const star = document.createElement('div');
                star.className = 'star-animation';
                star.style.left = `${event.clientX}px`;
                star.style.top = `${event.clientY}px`;
                star.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10 text-yellow-300 drop-shadow-[0_0_15px_gold]"><path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" /></svg>`;
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 800);
                state.completedTasks.push(id);
            } else {
                state.completedTasks = state.completedTasks.filter(t => t !== id);
            }
            localStorage.setItem('arp_tasks', JSON.stringify(state.completedTasks));
            render();
        };

        window.resetTraining = () => {
            state.completedTasks = [];
            localStorage.setItem('arp_tasks', '[]');
            render();
        };

        document.getElementById('profile-card').onclick = () => {
            document.getElementById('display-info').classList.add('hidden');
            document.getElementById('edit-info').classList.remove('hidden');
            document.getElementById('input-name').value = state.playerName;
        };

        document.getElementById('save-btn').onclick = (e) => {
            e.stopPropagation();
            state.playerName = document.getElementById('input-name').value.toUpperCase() || 'PLAYER 1';
            const deptSelect = document.getElementById('input-dept');
            state.playerDept = deptSelect.options[deptSelect.selectedIndex].value;
            localStorage.setItem('arp_name', state.playerName);
            localStorage.setItem('arp_dept', state.playerDept);
            document.getElementById('display-info').classList.remove('hidden');
            document.getElementById('edit-info').classList.add('hidden');
            render();
        };

        render();
    </script>
</body>
</html>
